<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracción Total — Buscador de Clips</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14161a;
    --panel:#1d2024;
    --panel-light:#262a30;
    --accent:#ff6a2b;
    --accent-dim:#a8431b;
    --accent-2:#3fa7c4;
    --text:#ece9e2;
    --text-mute:#8d9097;
    --border:#33373d;
    --success:#6fcf7e;
    --danger:#e2574c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--accent);color:#14161a;}
  *:focus-visible{outline:2px solid var(--accent-2);outline-offset:2px;}

  .wrap{max-width:880px;margin:0 auto;padding:28px 18px 80px;}

  header.brand{
    display:flex;align-items:flex-end;justify-content:space-between;gap:16px;
    padding-bottom:16px;margin-bottom:26px;border-bottom:3px solid var(--border);position:relative;
  }
  header.brand::after{
    content:"";position:absolute;bottom:-3px;left:0;height:3px;width:120px;
    background:repeating-linear-gradient(135deg,var(--accent) 0 8px,#0000 8px 16px);
  }
  .brand h1{
    font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.5px;
    font-size:clamp(22px,4vw,30px);margin:0;text-transform:uppercase;
  }
  .brand h1 span{color:var(--accent);}
  .brand p{margin:4px 0 0;color:var(--text-mute);font-size:13px;}
  .brand .tag{
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-mute);
    border:1px solid var(--border);padding:4px 9px;border-radius:3px;white-space:nowrap;
  }

  .panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:18px;}
  .mode-toggle{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .mode-btn{
    font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;
    background:var(--bg);color:var(--text-mute);border:1px solid var(--border);
    border-radius:5px;padding:7px 12px;cursor:pointer;
  }
  .mode-btn.active{background:var(--panel-light);color:var(--accent);border-color:var(--accent-dim);}
  .panel label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-mute);margin-bottom:8px;}
  textarea{
    width:100%;min-height:160px;resize:vertical;background:var(--bg);color:var(--text);
    border:1px solid var(--border);border-radius:6px;padding:12px;font-family:'Inter',sans-serif;
    font-size:14px;line-height:1.5;
  }
  textarea::placeholder{color:#5b5e64;}

  .btn{
    font-family:'Inter',sans-serif;font-weight:600;font-size:13.5px;
    border:none;border-radius:6px;padding:10px 16px;cursor:pointer;
    transition:transform .08s ease, filter .15s ease;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--accent);color:#16110c;}
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-secondary{background:var(--panel-light);color:var(--text);border:1px solid var(--border);}
  .btn-secondary:hover{border-color:var(--accent-2);}
  .btn-ghost{background:transparent;color:var(--accent-2);padding:6px 8px;font-size:12.5px;}
  .btn-ghost:hover{text-decoration:underline;}
  .btn[disabled]{opacity:.45;cursor:not-allowed;}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;align-items:center;}

  .toolbar{
    display:none;align-items:center;justify-content:space-between;gap:12px;
    flex-wrap:wrap;margin-bottom:18px;
  }
  .toolbar .status{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-mute);}

  .puesto{
    background:var(--panel);border:1px solid var(--border);border-radius:8px;
    margin-bottom:14px;overflow:hidden;
  }
  .puesto-head{display:flex;gap:14px;padding:16px;align-items:flex-start;}
  .puesto-num{
    flex:0 0 auto;width:52px;height:52px;display:flex;align-items:center;justify-content:center;
    font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;color:var(--accent);
    border:2px solid var(--accent-dim);
    clip-path:polygon(0 0,100% 0,100% 70%,70% 100%,0 100%);
  }
  .puesto-info{flex:1;min-width:0;}
  .puesto-info h3{margin:0 0 4px;font-size:15.5px;font-weight:600;}
  .puesto-info .ctx{margin:0;font-size:12.5px;color:var(--text-mute);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

  .gauge{height:3px;width:100%;background:var(--border);position:relative;overflow:hidden;}
  .gauge.loading::after{
    content:"";position:absolute;top:0;left:-30%;width:30%;height:100%;background:var(--accent);
    animation:sweep 1.1s ease-in-out infinite;
  }
  @keyframes sweep{0%{left:-30%;}100%{left:100%;}}
  @media (prefers-reduced-motion:reduce){ .gauge.loading::after{animation:none;left:0;width:100%;opacity:.5;} }

  .query-row{display:flex;gap:8px;padding:0 16px 14px;flex-wrap:wrap;}
  .query-row input[type=text]{
    flex:1;min-width:180px;background:var(--bg);border:1px solid var(--border);color:var(--text);
    border-radius:5px;padding:8px 10px;font-size:13px;font-family:'JetBrains Mono',monospace;
  }

  .status-line{padding:0 16px 10px;font-size:12px;color:var(--text-mute);font-family:'JetBrains Mono',monospace;}
  .status-line.error{color:var(--danger);}
  .status-line a{color:var(--accent-2);}

  .videos{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;
    padding:0 16px 16px;
  }
  .video-card{
    background:var(--panel-light);border:1px solid var(--border);border-radius:6px;overflow:hidden;
    display:flex;flex-direction:column;
  }
  .video-thumb{width:100%;aspect-ratio:16/9;background:#0e0f11;display:flex;align-items:center;justify-content:center;}
  .video-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .video-thumb svg{width:34px;height:34px;opacity:.35;}
  .video-body{padding:9px 10px 10px;display:flex;flex-direction:column;gap:5px;flex:1;}
  .video-title{font-size:12.5px;font-weight:600;line-height:1.3;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:32px;}
  .video-meta{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text-mute);
    display:flex;justify-content:space-between;}
  .video-actions{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:4px;}
  .video-actions a{font-size:11.5px;color:var(--accent-2);text-decoration:none;font-weight:600;}
  .video-actions a:hover{text-decoration:underline;}
  .video-actions label{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-mute);cursor:pointer;}
  .video-actions .del{cursor:pointer;color:var(--text-mute);font-size:14px;line-height:1;border:none;background:none;}
  .video-actions .del:hover{color:var(--danger);}

  .add-manual{padding:0 16px 16px;display:flex;gap:8px;flex-wrap:wrap;}
  .add-manual input{
    flex:1;min-width:200px;background:var(--bg);border:1px dashed var(--border);color:var(--text);
    border-radius:5px;padding:7px 10px;font-size:12.5px;
  }

  .export-panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:22px;}
  .export-panel h4{margin:0 0 10px;font-family:'Oswald',sans-serif;font-size:14px;text-transform:uppercase;letter-spacing:.5px;}
  textarea#exportArea{min-height:140px;font-family:'JetBrains Mono',monospace;font-size:12px;}

  .empty-hint{color:var(--text-mute);font-size:13px;padding:20px 4px;}
  .hidden{display:none !important;}
</style>
</head>
<body>
<div class="wrap">

  <header class="brand">
    <div>
      <h1>Tracción <span>Total</span></h1>
      <p>Buscador de clips de YouTube por puesto del guion</p>
    </div>
    <div class="tag">NEXLEV · YOUTUBE SEARCH</div>
  </header>

  <div class="panel">
    <div class="mode-toggle" id="modeToggle">
      <button class="mode-btn active" data-mode="auto" type="button">Guion con marcadores</button>
      <button class="mode-btn" data-mode="simple" type="button">Lista simple (un título por línea)</button>
    </div>
    <label for="scriptInput" id="scriptLabel">Pegá el guion completo (cualquier formato: "Puesto 10", "Top 10", "#10", "10."...)</label>
    <textarea id="scriptInput" placeholder="PUESTO 10: Mack Anthem con cabina dormitorio de lujo&#10;[narración...]&#10;&#10;PUESTO 9: ..."></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" id="analyzeBtn">Analizar guion</button>
      <span id="analyzeMsg" style="font-size:12.5px;color:var(--text-mute);"></span>
    </div>
  </div>

  <div class="toolbar" id="toolbar">
    <div class="btn-row" style="margin-top:0;">
      <button class="btn btn-primary" id="searchAllBtn">Buscar videos para todos</button>
      <button class="btn btn-secondary" id="clearBtn">Empezar de nuevo</button>
    </div>
    <div class="status" id="progressStatus"></div>
  </div>

  <div id="results"></div>

  <div class="export-panel hidden" id="exportPanel">
    <h4>Exportar links</h4>
    <div class="btn-row" style="margin-top:0;margin-bottom:10px;">
      <button class="btn btn-secondary" id="buildExportBtn">Generar lista (seleccionados)</button>
      <button class="btn btn-secondary" id="copyExportBtn">Copiar</button>
      <button class="btn btn-secondary" id="downloadExportBtn">Descargar .txt</button>
    </div>
    <textarea id="exportArea" readonly placeholder="Acá va a aparecer la lista de links agrupada por puesto, lista para pasar a tu carpeta de descargas."></textarea>
  </div>

</div>

<script>
const NEXLEV_MCP = { type: "url", url: "https://prod.dashboard.nexlev.io/api/claude-mcp", name: "nexlev-mcp" };
const PLACEHOLDER_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="#8d9097" stroke-width="1.5"><path d="M3 13h11l3 4h3a1 1 0 0 0 1-1v-3l-3-4h-3V8a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v5z"/><circle cx="7.5" cy="17.5" r="1.5"/><circle cx="17.5" cy="17.5" r="1.5"/></svg>`;

let state = { segments: [] };

function detectSegments(raw){
  const strategies = [
    {
      label: 'palabra clave ("puesto", "top", "lugar"...)',
      re: /\b(?:puesto|top|lugar|posici[oó]n|n[uú]mero)\b[\s:\-–—#°ºn\.]{0,12}(\d{1,2})\b/gi
    },
    {
      label: 'numeración tipo "#10" o "N°10"',
      re: /(?:^|\s)#\s?(\d{1,2})\b|n[°º]\s?(\d{1,2})\b/gim
    },
    {
      label: 'lista numerada ("10.", "10)", "10 -")',
      re: /^[ \t]*(\d{1,2})\s*[\.\):\-–—]\s+\S/gm
    },
    {
      label: "número solo en su propia línea",
      re: /^[ \t]*(\d{1,2})[ \t]*$/gm
    }
  ];

  for(const strat of strategies){
    const found = [];
    let m;
    strat.re.lastIndex = 0;
    while((m = strat.re.exec(raw)) !== null){
      const numStr = m[1] || m[2];
      const num = parseInt(numStr, 10);
      if(!num || num < 1 || num > 30) continue;
      found.push({ index: m.index, num: numStr });
    }
    if(found.length >= 3){
      return { segments: buildSegmentsFromMatches(raw, found), strategyLabel: strat.label };
    }
  }
  return { segments: [], strategyLabel: "" };
}

function buildSegmentsFromMatches(raw, matches){
  const segments = [];
  for(let i=0;i<matches.length;i++){
    const start = matches[i].index;
    const end = i+1 < matches.length ? matches[i+1].index : raw.length;
    let block = raw.slice(start, end).trim();
    const headerLine = (block.split("\n")[0] || "").trim();
    let title = headerLine.replace(/^(?:puesto|top|lugar|posici[oó]n|n[uú]mero)?\s*[#\d°ºn\.\s:\-–—]{0,16}/i, "").trim();
    if(!title){
      const lines = block.split("\n").map(l=>l.trim()).filter(Boolean);
      title = lines[1] || lines[0] || ("Puesto " + matches[i].num);
    }
    segments.push({
      num: matches[i].num,
      title: title.slice(0,120) || ("Puesto " + matches[i].num),
      context: block.slice(0,500),
      query: (title || ("Puesto " + matches[i].num)).slice(0,90),
      status: "idle",
      errorMsg: "",
      videos: []
    });
  }
  return segments;
}

function parseSimpleList(raw){
  const lines = raw.split("\n").map(l=>l.trim()).filter(Boolean);
  return lines.map((line, idx) => ({
    num: String(idx+1),
    title: line.slice(0,120),
    context: line,
    query: line.slice(0,90),
    status: "idle",
    errorMsg: "",
    videos: []
  }));
}

function getYoutubeId(url){
  if(!url) return null;
  const m = url.match(/(?:v=|\/shorts\/|youtu\.be\/|\/embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

function extractJsonArray(text){
  const start = text.indexOf("[");
  const end = text.lastIndexOf("]");
  if(start === -1 || end === -1 || end < start) return null;
  try{ return JSON.parse(text.slice(start, end+1)); } catch(e){ return null; }
}

async function callClaude(systemPrompt, userPrompt){
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1500,
      system: systemPrompt,
      messages: [{ role: "user", content: userPrompt }],
      mcp_servers: [NEXLEV_MCP]
    })
  });
  if(!res.ok) throw new Error("HTTP " + res.status);
  const data = await res.json();
  const text = (data.content || [])
    .filter(b => b.type === "text")
    .map(b => b.text)
    .join("\n");
  return text;
}

const SYSTEM_PROMPT = `Sos un asistente especializado en buscar b-roll de YouTube para el canal "Tracción Total" (camiones y vehículos pesados). Tu objetivo es encontrar material de uso justo: tomas del vehículo, no de personas.

REGLAS ESTRICTAS DE BÚSQUEDA:
1. MODELO EXACTO: Si el guion menciona una marca Y un modelo específico (ej: "Scammell Scarab", "Kenworth W900", "Mack Superliner"), buscá AMBOS juntos. Nunca busques solo la marca. El modelo es obligatorio en la query.
2. TIPO DE VIDEO PREFERIDO (en orden de prioridad):
   - Documentales o reportajes sobre el vehículo (ej: "Scammell Scarab documentary", "Kenworth W900 history")
   - Videos de exhibición, shows, concursos (ej: "truck show", "custom truck exhibition")
   - Reviews de canales especializados donde predominen las tomas exteriores del camión
   - Footage de rodaje, convoy, o en acción sin presentador en pantalla
   EVITAR: vlogs tipo "yo con mi camión", videos donde la persona habla a cámara más de lo que muestra el vehículo, videos de opinión/review donde el presentador es el protagonista.
3. Buscá en inglés para obtener mejor cobertura global.
4. Formato largo únicamente, no Shorts.
5. Encontrá exactamente 6 videos.

FORMATO DE RESPUESTA: Respondé ÚNICAMENTE con un array JSON válido, sin texto adicional, sin bloques de código markdown:
[{"title":"...", "channel":"...", "url":"...", "duration":"...", "views":"..."}]
Si algún dato no está disponible dejalo como string vacío. Cero texto fuera del array JSON.`;

function renderApp(){
  document.getElementById("toolbar").style.display = state.segments.length ? "flex" : "none";
  const resultsEl = document.getElementById("results");
  if(state.segments.length === 0){
    resultsEl.innerHTML = "";
    document.getElementById("exportPanel").classList.add("hidden");
    return;
  }
  resultsEl.innerHTML = state.segments.map((seg, i) => renderPuesto(seg, i)).join("");
  document.getElementById("exportPanel").classList.remove("hidden");
}

function renderPuesto(seg, i){
  const statusLine = seg.status === "error"
    ? `<div class="status-line error">No se pudo buscar automáticamente (${escapeHtml(seg.errorMsg||"error")}). Probá de nuevo o usá el link manual de abajo.</div>`
    : seg.status === "done" && seg.videos.length === 0
      ? `<div class="status-line">Sin resultados automáticos. Ajustá la búsqueda o agregá un link manual.</div>`
      : "";

  const manualSearchUrl = "https://www.youtube.com/results?search_query=" + encodeURIComponent(seg.query);

  return `
  <div class="puesto" data-i="${i}">
    <div class="puesto-head">
      <div class="puesto-num">${escapeHtml(seg.num)}</div>
      <div class="puesto-info">
        <h3>${escapeHtml(seg.title)}</h3>
        <p class="ctx">${escapeHtml(seg.context.replace(/\s+/g," "))}</p>
      </div>
    </div>
    <div class="gauge ${seg.status==='loading' ? 'loading' : ''}"></div>
    <div class="query-row">
      <input type="text" value="${escapeAttr(seg.query)}" data-role="query" data-i="${i}">
      <button class="btn btn-secondary" data-action="search" data-i="${i}" ${seg.status==='loading'?'disabled':''}>
        ${seg.status==='loading' ? 'Buscando…' : (seg.status==='done' ? 'Buscar de nuevo' : 'Buscar videos')}
      </button>
      <a class="btn btn-ghost" href="${manualSearchUrl}" target="_blank" rel="noopener">Abrir búsqueda manual ↗</a>
    </div>
    ${statusLine}
    ${seg.videos.length ? `<div class="videos">${seg.videos.map((v,vi)=>renderVideo(v,i,vi)).join("")}</div>` : ""}
    <div class="add-manual">
      <input type="text" placeholder="Pegar link de YouTube manualmente" data-role="manualUrl" data-i="${i}">
      <button class="btn btn-secondary" data-action="addManual" data-i="${i}">Agregar</button>
    </div>
  </div>`;
}

function renderVideo(v, i, vi){
  const ytId = getYoutubeId(v.url);
  const thumb = ytId
    ? `<img src="https://i.ytimg.com/vi/${ytId}/mqdefault.jpg" alt="" loading="lazy">`
    : PLACEHOLDER_SVG;
  return `
  <div class="video-card">
    <div class="video-thumb">${thumb}</div>
    <div class="video-body">
      <div class="video-title">${escapeHtml(v.title || "Sin título")}</div>
      <div class="video-meta"><span>${escapeHtml(v.duration||"—")}</span><span>${escapeHtml(v.views||"")}</span></div>
      <div class="video-meta"><span>${escapeHtml(v.channel||"")}</span></div>
      <div class="video-actions">
        <label><input type="checkbox" ${v.checked?'checked':''} data-action="toggle" data-i="${i}" data-vi="${vi}"> usar</label>
        <a href="${escapeAttr(v.url)}" target="_blank" rel="noopener">abrir ↗</a>
        <button class="del" title="quitar" data-action="remove" data-i="${i}" data-vi="${vi}">✕</button>
      </div>
    </div>
  </div>`;
}

function escapeHtml(str){
  return String(str||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function escapeAttr(str){ return escapeHtml(str); }

async function searchPuesto(i, customQuery){
  const seg = state.segments[i];
  seg.status = "loading";
  seg.errorMsg = "";
  renderApp();
  try{
    const userPrompt = customQuery
      ? `Consulta directa: "${customQuery}"`
      : `Tema del puesto ${seg.num}: ${seg.title}\n\nContexto del guion:\n${seg.context}`;
    const text = await callClaude(SYSTEM_PROMPT, userPrompt);
    const arr = extractJsonArray(text);
    if(!arr) throw new Error("respuesta sin JSON válido");
    seg.videos = arr.slice(0,6).map(v => ({
      title: v.title || "", channel: v.channel || "", url: v.url || "",
      duration: v.duration || "", views: v.views || "", checked: true
    }));
    seg.status = "done";
  }catch(err){
    seg.status = "error";
    seg.errorMsg = err.message || String(err);
  }
  renderApp();
}

async function searchAll(){
  const btn = document.getElementById("searchAllBtn");
  btn.disabled = true;
  for(let i=0;i<state.segments.length;i++){
    document.getElementById("progressStatus").textContent =
      `Buscando puesto ${state.segments[i].num} (${i+1} de ${state.segments.length})…`;
    await searchPuesto(i);
    await new Promise(r => setTimeout(r, 250));
  }
  document.getElementById("progressStatus").textContent = "Listo.";
  btn.disabled = false;
}

function buildExportText(){
  let out = "";
  state.segments.forEach(seg => {
    const checked = seg.videos.filter(v => v.checked);
    out += `PUESTO ${seg.num} — ${seg.title}\n`;
    if(checked.length === 0){
      out += `  (sin links seleccionados)\n`;
    }else{
      checked.forEach((v,idx) => { out += `  ${idx+1}. ${v.url}  [${v.title}]\n`; });
    }
    out += "\n";
  });
  return out.trim();
}

document.addEventListener("DOMContentLoaded", () => {
  let parseMode = "auto";
  document.querySelectorAll(".mode-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      parseMode = btn.dataset.mode;
      const ta = document.getElementById("scriptInput");
      const label = document.getElementById("scriptLabel");
      if(parseMode === "simple"){
        label.textContent = "Pegá un título por línea, en el orden que quieras numerarlos";
        ta.placeholder = "Mack Anthem cabina dormitorio de lujo\nKenworth W900 customizado\nPeterbilt 389 lowrider\n...";
      }else{
        label.textContent = 'Pegá el guion completo (cualquier formato: "Puesto 10", "Top 10", "#10", "10."...)';
        ta.placeholder = "PUESTO 10: Mack Anthem con cabina dormitorio de lujo\n[narración...]\n\nPUESTO 9: ...";
      }
    });
  });

  document.getElementById("analyzeBtn").addEventListener("click", () => {
    const raw = document.getElementById("scriptInput").value;
    const msg = document.getElementById("analyzeMsg");
    let segs = [];
    let strategyLabel = "";
    if(parseMode === "simple"){
      segs = parseSimpleList(raw);
      strategyLabel = "lista simple";
    }else{
      const result = detectSegments(raw);
      segs = result.segments;
      strategyLabel = result.strategyLabel;
    }
    if(segs.length === 0){
      msg.textContent = "No pude detectar puestos en este formato. Probá el modo 'Lista simple' de arriba: pegá solo los títulos, uno por línea.";
      msg.style.color = "var(--danger)";
      return;
    }
    state.segments = segs;
    msg.textContent = `${segs.length} puestos detectados (${strategyLabel}).`;
    msg.style.color = "var(--success)";
    renderApp();
  });

  document.getElementById("clearBtn").addEventListener("click", () => {
    state.segments = [];
    document.getElementById("scriptInput").value = "";
    document.getElementById("analyzeMsg").textContent = "";
    document.getElementById("progressStatus").textContent = "";
    renderApp();
  });

  document.getElementById("searchAllBtn").addEventListener("click", searchAll);

  document.getElementById("results").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-action]");
    if(!btn) return;
    const action = btn.dataset.action;
    const i = parseInt(btn.dataset.i, 10);
    if(action === "search"){
      const input = document.querySelector(`input[data-role="query"][data-i="${i}"]`);
      state.segments[i].query = input.value.trim() || state.segments[i].title;
      searchPuesto(i, state.segments[i].query);
    }else if(action === "toggle"){
      const vi = parseInt(btn.dataset.vi, 10);
      state.segments[i].videos[vi].checked = btn.checked;
    }else if(action === "remove"){
      const vi = parseInt(btn.dataset.vi, 10);
      state.segments[i].videos.splice(vi, 1);
      renderApp();
    }else if(action === "addManual"){
      const input = document.querySelector(`input[data-role="manualUrl"][data-i="${i}"]`);
      const url = input.value.trim();
      if(url){
        state.segments[i].videos.push({ title:"Agregado manualmente", channel:"", url, duration:"", views:"", checked:true });
        input.value = "";
        renderApp();
      }
    }
  });

  document.getElementById("results").addEventListener("change", (e) => {
    if(e.target.dataset.role === "query"){
      const i = parseInt(e.target.dataset.i, 10);
      state.segments[i].query = e.target.value;
    }
  });

  document.getElementById("buildExportBtn").addEventListener("click", () => {
    document.getElementById("exportArea").value = buildExportText();
  });
  document.getElementById("copyExportBtn").addEventListener("click", () => {
    const area = document.getElementById("exportArea");
    if(!area.value) area.value = buildExportText();
    area.select();
    navigator.clipboard.writeText(area.value).catch(()=>{ document.execCommand("copy"); });
  });
  document.getElementById("downloadExportBtn").addEventListener("click", () => {
    const text = document.getElementById("exportArea").value || buildExportText();
    const blob = new Blob([text], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "clips-traccion-total.txt";
    a.click();
  });
});
</script>
</body>
</html>
